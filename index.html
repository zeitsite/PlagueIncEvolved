<!doctype html>
<html lang="en-us">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />

    <!-- IMPORTANT: Use local paths, not CDN -->
    <base href="/" />

    <title>Plague Inc</title>

    <style>
      html, body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: black;
      }

      #unity-canvas {
        width: 100vw;
        height: 100vh;
        display: block;
      }

      #loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 10px;
        background: #0b0b0b;
        color: white;
        font-family: sans-serif;
      }

      #bar {
        width: 60%;
        height: 12px;
        background: #333;
      }

      #fill {
        height: 100%;
        width: 0%;
        background: #4caf50;
      }
    </style>
  </head>

  <body>
    <div id="loader">
      <div id="text">0 MB / 300 MB</div>
      <div id="bar"><div id="fill"></div></div>
    </div>

    <canvas id="unity-canvas"></canvas>

    <!-- Load your local loader.js -->
    <script src="Build/bb0d9ecdb05db3e84da20bd14a4f84dc.loader.js"></script>

    <script>
      /* LOCAL PATHS — FIXED */
      const baseBuild = "Build/";
      const base = "";

      const MAX_RETRIES = 3;
      const RETRY_DELAY_MS = 1000;

      const partProgress = new Map();
      const totalGuess = 317 * 1024 * 1024;

      function sleep(ms) {
        return new Promise((resolve) => setTimeout(resolve, ms));
      }

      function updateUI() {
        let loaded = 0;
        for (const v of partProgress.values()) loaded += v;
        const mb = (loaded / 1024 / 1024).toFixed(1);
        const total = (totalGuess / 1024 / 1024).toFixed(0);
        document.getElementById("text").textContent = mb + " MB / " + total + " MB";
        document.getElementById("fill").style.width = (loaded / totalGuess) * 100 + "%";
      }

      async function fetchPartWithRetry(url, retries = MAX_RETRIES) {
        for (let attempt = 0; attempt <= retries; attempt++) {
          try {
            const res = await fetch(url);
            if (!res.ok) throw new Error("HTTP " + res.status + " for " + url);

            if (attempt > 0) {
              partProgress.set(url, 0);
              updateUI();
            }

            const reader = res.body.getReader();
            const chunks = [];
            let received = 0;

            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              received += value.byteLength;
              partProgress.set(url, received);
              updateUI();
            }

            const out = new Uint8Array(received);
            let off = 0;
            for (const c of chunks) {
              out.set(c, off);
              off += c.byteLength;
            }
            return out.buffer;

          } catch (err) {
            if (attempt < retries) {
              console.warn(`Retry ${attempt + 1}/${retries} for ${url}:`, err.message);
              await sleep(RETRY_DELAY_MS * (attempt + 1));
            } else {
              throw new Error("Failed after " + (retries + 1) + " attempts: " + url);
            }
          }
        }
      }

      const files = [
        { name: "6b69ec426bff8a6bd4e760a1d5f507b9.wasm", parts: 2 },
        { name: "3719aa6c33bf126ed64864ee5fc2fafc.data", parts: 15 }
      ];

      function buildUrls(file) {
        const urls = [];
        for (let i = 0; i < file.parts; i++) {
          urls.push(baseBuild + file.name + ".part" + String(i).padStart(2, "0"));
        }
        return urls;
      }

      async function loadFile(file) {
        const urls = buildUrls(file);
        const buffers = await Promise.all(urls.map((url) => fetchPartWithRetry(url)));

        let size = 0;
        for (const b of buffers) size += b.byteLength;

        const out = new Uint8Array(size);
        let off = 0;
        for (const b of buffers) {
          out.set(new Uint8Array(b), off);
          off += b.byteLength;
        }

        return out.buffer;
      }

      async function start() {
        const [wasm, data] = await Promise.all([
          loadFile(files[0]),
          loadFile(files[1])
        ]);

        const wasmUrl = URL.createObjectURL(new Blob([wasm], { type: "application/wasm" }));
        const dataUrl = URL.createObjectURL(new Blob([data]));

        document.getElementById("loader").style.display = "none";

        createUnityInstance(document.querySelector("#unity-canvas"), {
          dataUrl: dataUrl,
          frameworkUrl: baseBuild + "b4b58f3ff6d98fbfb83482e25e0e9a5c.framework.js",
          codeUrl: wasmUrl,
          streamingAssetsUrl: "StreamingAssets",
          companyName: "Ndemic Creations",
          productName: "Plague Inc",
          productVersion: "1.18.3.2"
        });
      }

      start().catch(function (err) {
        document.getElementById("text").textContent = "Error: " + err.message;
        console.error(err);
      });
    </script>
  </body>
</html>
